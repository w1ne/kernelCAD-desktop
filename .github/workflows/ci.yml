name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo add-apt-repository -y ppa:kicad/kicad-7.0-releases
          sudo apt-get update
          sudo apt-get install -y \
            qt6-base-dev libqt6opengl6-dev libqt6openglwidgets6 \
            libqt6test6 libqt6printsupport6 \
            libocct-foundation-dev libocct-modeling-data-dev \
            libocct-modeling-algorithms-dev libocct-data-exchange-dev \
            libocct-visualization-dev libocct-ocaf-dev \
            libtbb-dev xvfb

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DKERNELCAD_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Unit Tests
        run: xvfb-run -a sh -c 'cd build && ctest --output-on-failure'

      - name: Integration Tests
        run: xvfb-run -a ./tests/test_integration.sh

      - name: Stress Tests
        run: xvfb-run -a ./tests/test_stress.sh

      - name: Python API Test
        run: |
          python3 -c "
          import sys; sys.path.insert(0, 'python')
          from kernelcad import Workplane
          part = Workplane('XY').rect(80,60).extrude(20).fillet(3)
          assert part.properties()['volume'] > 0
          part.exportStep('/tmp/ci_test.step')
          print('Python API: PASS')
          "

  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Check for common issues
        run: |
          echo "=== Code Quality Checks ==="

          echo -n "TODO/FIXME count: "
          grep -rn "TODO\|FIXME\|HACK" src/ --include="*.cpp" --include="*.h" | wc -l

          echo -n "Tabs (should be spaces): "
          grep -rPl "\t" src/ --include="*.cpp" --include="*.h" | wc -l

          echo -n "Trailing whitespace: "
          grep -rPl " $" src/ --include="*.cpp" --include="*.h" | wc -l

          echo -n "Files >5000 lines: "
          find src -name "*.cpp" -o -name "*.h" | xargs wc -l | sort -rn | awk '$1 > 5000 {print $2}' | wc -l

          echo -n "Raw new in non-UI code: "
          grep -rn "\bnew\b" src/kernel/ src/document/ src/features/ src/sketch/ --include="*.cpp" | grep -v "make_unique\|make_shared\|Handle\|Standard" | wc -l

          echo ""
          echo "=== Header include check ==="
          echo -n "Feature.h fan-in: "
          grep -rl "Feature.h" src/ --include="*.cpp" --include="*.h" | wc -l

          echo ""
          echo "All checks passed (informational only)"

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo add-apt-repository -y ppa:kicad/kicad-7.0-releases
          sudo apt-get update
          sudo apt-get install -y \
            qt6-base-dev libqt6opengl6-dev libqt6openglwidgets6 \
            libqt6test6 libqt6printsupport6 \
            libocct-foundation-dev libocct-modeling-data-dev \
            libocct-modeling-algorithms-dev libocct-data-exchange-dev \
            libocct-visualization-dev libocct-ocaf-dev \
            libtbb-dev

      - name: Build Release
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Package DEB and RPM
        run: |
          cd build
          cpack -G DEB
          cpack -G RPM
          cpack -G TGZ
          cd ..
          mv build/*.deb .
          mv build/*.rpm .
          mv build/*.tar.gz ./kernelcad-desktop-linux-x64.tar.gz

      - name: Build AppImage
        env:
          LINUXDEPLOY_OUTPUT_VERSION: "0.1.0"
        run: |
          wget -qnc https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -qnc https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

          export APPIMAGE_EXTRACT_AND_RUN=1
          export QMAKE=/usr/bin/qmake6

          mkdir -p AppDir/usr/bin
          cp build/src/kernelCAD AppDir/usr/bin/
          cp build/src/kernelcad-cli AppDir/usr/bin/
          cp -r plugins/ AppDir/usr/bin/
          cp -r python/ AppDir/usr/bin/

          ./linuxdeploy-x86_64.AppImage --appdir AppDir --executable AppDir/usr/bin/kernelCAD --executable AppDir/usr/bin/kernelcad-cli --desktop-file kernelcad.desktop --icon-file kernelcad.svg --plugin qt --output appimage

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            kernelcad-desktop-linux-x64.tar.gz
            *.deb
            *.rpm
            *.AppImage
          body_path: CHANGELOG.md
